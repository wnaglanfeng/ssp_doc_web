    <!-- 设置SVG样式和线条动画 -->
    <style>
        .hero-svg {
            display: block;
            margin: 20px auto; /* 水平居中，上下留间距 */
            width: 100%; /* 响应式宽度，可自定义 */
            max-width: 552px; /* 限制最大宽度 */
        }
        
        /* 线条动画效果 */
        .animated-line {
            animation: dash-animation 3s linear infinite;
            stroke-dasharray: 10;
            stroke-dashoffset: 0;
        }
        
        @keyframes dash-animation {
            0% {
                stroke-dashoffset: 0;
            }
            100% {
                stroke-dashoffset: 20;
            }
        }
        
        /* 路径动画效果 */
        .animated-path {
            animation: path-glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes path-glow {
            0% {
                stroke-width: 1;
                opacity: 0.7;
            }
            100% {
                stroke-width: 2;
                opacity: 1;
            }
        }
        
        /* 浮动动画效果 */
        .floating-element {
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-5px);
            }
        }
    </style>
</head>
